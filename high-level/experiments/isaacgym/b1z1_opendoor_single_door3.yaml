env:
  numEnvs: 4096
  numAgents: 1
  envSpacing: 5.0
  enableDebugVis: False
  cameraMode: "full"
  isFlagrun: False
  maxEpisodeLength: 220
  pdControl: True
  powerScale: 1.0
  controlFrequencyInv: 4
  controlFrequencyLow: 8
  imgDelayFrame: 4

  doorOpenSuccessThreshold: 0.45
  doorOpenHoldSteps: 6
  handleOpenThresholdRatio: 0.55
  baseDoorDisThreshold: 0.85
  eeFarThreshold: 1.1
  holdSteps: 10
  lastCommands: False
  smallValueSetZero: False
  useTanh: False
  wandb: False

  low_policy_path: "/home/sivan/whole_body/visual_whole_body/low-level/logs/b1z1-low/b1z1_try/model_28400.pt"

  asset:
    assetRoot: "data/asset"
    assetFileRobot: "b1z1-col/urdf/b1z1.urdf"
    assetFileDoor: "door_set/"
    load_block: "single_99655039960006"
    trainAssets:
      single_99655039960006:
        "0":
          bounding_box: "99655039960006/bounding_box.json"
          handle_bounding: "99655039960006/handle_bounding.json"
          name: "99655039960006"
          path: "99655039960006/mobility.urdf"

    control:
      stiffness: {"joint": 80, "z1": 5}
      damping: {"joint": 2.0, "z1": 0.5}

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 0.0

physics_engine: "physx"

sim:
  substeps: 1
  use_gpu_pipeline: True
  up_axis: "z"
  gravity: [0.0, 0.0, -9.81]
  dt: 0.005

  physx:
    use_gpu: True
    num_threads: 4
    solver_type: 1
    num_position_iterations: 8
    num_velocity_iterations: 0
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 50.0
    default_buffer_size_multiplier: 100.0
    max_gpu_contact_pairs: 1000000

reward:
  base_height_target: 0.55
  only_positive_rewards: False
  scales:
    approach_handle: 1.0
    ee_align_handle: 0.15
    lever_press: 1.0
    door_open_progress: 2.0
    door_open_success: 5.0
    base_command_penalty: -0.05
    action_rate: -0.001
    gripper_rate: -0.001
    base_height: 0.2

sensor:
  depth_clip_lower: 0.15
  depth_clip_rand_range: [0.18, 0.25]
  enableCamera: False
  resized_resolution: [96, 54]
  onboard_camera:
    horizontal_fov: 69
    resolution: [96, 54]
    position: [0.425, 0.04, 0.12]
    rotation: [0.0, 0.0, 0.0]
  wrist_camera:
    horizontal_fov: 69
    resolution: [96, 54]
    position: [0.0955, 0.22, -0.03175]
    rotation: [-1.57, 0.0, -0.87]
    rand_position: [0.005, 0.005, 0.005]
